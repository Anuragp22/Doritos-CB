services:
  backend:
    command: ["sh", "-c", "npx prisma migrate deploy && npx nodemon index.js"]
    environment:
      NODE_ENV: development
    volumes:
      - ./BACKEND:/app
      - /app/node_modules
      - backend_uploads:/app/uploads

  client:
    build:
      context: ./CLIENT
      target: dev
    # Replace the base "5173:80" mapping; in dev Vite serves on 5173, not nginx on 80.
    ports: !override
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    volumes:
      - ./CLIENT:/app
      - /app/node_modules

  model:
    command: ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "5000", "--reload"]
    volumes:
      - ./MODEL:/app
      - huggingface_cache:/root/.cache/huggingface
      - model_checkpoints:/app/checkpoints

  trainer:
    volumes:
      - ./MODEL:/app
      - huggingface_cache:/root/.cache/huggingface
      - model_checkpoints:/app/checkpoints
