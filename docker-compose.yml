services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doritos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-doritos}
      POSTGRES_DB: ${POSTGRES_DB:-doritos}
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doritos} -d ${POSTGRES_DB:-doritos}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./BACKEND
    environment:
      PORT: 3000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5173}
      DATABASE_URL: postgresql://${POSTGRES_USER:-doritos}:${POSTGRES_PASSWORD:-doritos}@postgres:5432/${POSTGRES_DB:-doritos}?schema=public
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required — set it in .env}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      GEN_MODEL: ${GEN_MODEL:-qwen3.5:2b}
      EMBED_API_URL: ${EMBED_API_URL:-http://model:5000/embed}
      RERANK_API_URL: ${RERANK_API_URL:-http://model:5000/rerank}
      MODEL_API_KEY: ${MODEL_API_KEY:-}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      model:
        condition: service_started
      ollama:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads

  client:
    build:
      context: ./CLIENT
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    ports:
      - "5173:80"
    depends_on:
      - backend

  # Local generation runtime. Serves the multimodal chat model on CPU.
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 20

  # One-shot: pulls GEN_MODEL into the ollama service on startup. Falls back to
  # `ollama show` so an offline restart (model already cached) still exits 0.
  ollama-pull:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      - /bin/sh
      - -c
      - ollama pull "${GEN_MODEL:-qwen3.5:2b}" || ollama show "${GEN_MODEL:-qwen3.5:2b}"
    restart: "no"

  # Embeddings + reranking on CPU. server.py runs with ENABLE_GENERATION=false
  # so it skips the VLM and only serves /embed and /rerank.
  model:
    build: ./MODEL
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      MODEL_ID: ${MODEL_ID:-Qwen/Qwen2-VL-2B-Instruct}
      ENABLE_GENERATION: "false"
      HF_HOME: /root/.cache/huggingface
    ports:
      - "5000:5000"
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - model_checkpoints:/app/checkpoints
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # LLaMA-Factory Gradio Web UI for fine-tuning Qwen2-VL.
  # Started on demand via: docker compose --profile model up trainer
  # Note: training competes with the model service for GPU; run one at a time.
  trainer:
    build: ./MODEL
    command: ["llamafactory-cli", "webui"]
    environment:
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: "7860"
      HF_HOME: /root/.cache/huggingface
    ports:
      - "7860:7860"
    profiles:
      - model
    volumes:
      - huggingface_cache:/root/.cache/huggingface
      - model_checkpoints:/app/checkpoints
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  postgres_data:
  backend_uploads:
  huggingface_cache:
  model_checkpoints:
  ollama_data:
